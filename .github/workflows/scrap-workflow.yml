name: Check diff

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 6'

jobs:
  run-scrap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Check
        run: pnpm check:all

      - name: Scrap
        run: pnpm scrap

      - name: Check for changes
        id: git_diff
        run: git diff --exit-code || echo "::set-output name=changed::true"

      - name: Generate commit message
        if: ${{ steps.git_diff.outputs.changed == 'true' }}
        id: generate_commit_message
        run: |
          MODIFIED_FILES=$(git diff --name-only -- snapshots-mv3 snapshots-mv2)
          RECOGNIZED_URLS=""

          while IFS= read -r FILE; do
            case "$FILE" in
              snapshots-mv3/api/*.html)
                NAME="${FILE#snapshots-mv3/api/}"
                NAME="${NAME%.html}"
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV3|https://developer.chrome.com/docs/extensions/reference/api/${NAME}"$'\n'
                ;;
              snapshots-mv3/manifest/*.html)
                NAME="${FILE#snapshots-mv3/manifest/}"
                NAME="${NAME%.html}"
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV3|https://developer.chrome.com/docs/extensions/reference/manifest/${NAME}"$'\n'
                ;;
              snapshots-mv3/api.html)
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV3|https://developer.chrome.com/docs/extensions/reference/api"$'\n'
                ;;
              snapshots-mv3/manifest.html)
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV3|https://developer.chrome.com/docs/extensions/reference/manifest"$'\n'
                ;;
              snapshots-mv3/permissions-list.html)
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV3|https://developer.chrome.com/docs/extensions/reference/permissions-list"$'\n'
                ;;
              snapshots-mv2/api/*.html)
                NAME="${FILE#snapshots-mv2/api/}"
                NAME="${NAME%.html}"
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV2|https://developer.chrome.com/docs/extensions/mv2/reference/${NAME}"$'\n'
                ;;
              snapshots-mv2/index.html)
                RECOGNIZED_URLS="${RECOGNIZED_URLS}MV2|https://developer.chrome.com/docs/extensions/mv2/reference"$'\n'
                ;;
            esac
          done <<< "$MODIFIED_FILES"

          mapfile -t URL_LINES < <(printf '%s' "$RECOGNIZED_URLS" | sed '/^$/d' | sort -u)
          FILE_COUNT=${#URL_LINES[@]}

          if [ "$FILE_COUNT" -eq 0 ]; then
            COMMIT_MESSAGE="chore(scrap): update generated files"
          else
            COMMIT_MESSAGE="chore(scrap): update ${FILE_COUNT} snapshots"
          fi

          MV3_SECTION=""
          MV2_SECTION=""

          for LINE in "${URL_LINES[@]}"; do
            VERSION="${LINE%%|*}"
            URL="${LINE#*|}"

            case "$VERSION" in
              MV3)
                MV3_SECTION="${MV3_SECTION}${URL}"$'\n'
                ;;
              MV2)
                MV2_SECTION="${MV2_SECTION}${URL}"$'\n'
                ;;
            esac
          done

          DESCRIPTION=""

          if [ -n "$MV3_SECTION" ]; then
            DESCRIPTION="${DESCRIPTION}MV3:"$'\n'
            DESCRIPTION="${DESCRIPTION}${MV3_SECTION}"
          fi

          if [ -n "$MV2_SECTION" ]; then
            if [ -n "$DESCRIPTION" ]; then
              DESCRIPTION="${DESCRIPTION}"$'\n'
            fi
            DESCRIPTION="${DESCRIPTION}MV2:"$'\n'
            DESCRIPTION="${DESCRIPTION}${MV2_SECTION}"
          fi

          DESCRIPTION="${DESCRIPTION%$'\n'}"

          {
            echo "commit_message<<EOF"
            printf '%s\n' "$COMMIT_MESSAGE"
            echo "EOF"
          } >> "$GITHUB_ENV"

          {
            echo "commit_description<<EOF"
            printf '%s\n' "$DESCRIPTION"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Commit changes
        if: ${{ steps.git_diff.outputs.changed == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: |
            ${{ env.commit_message }}

            ${{ env.commit_description }}
